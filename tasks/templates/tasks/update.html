{% extends 'base.html' %}
{% load i18n %}

{% block title %}{% trans "Изменить задачу" %}{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2>{% trans "Изменить" %} «{{ object.name }}»</h2>

    <form method="post">
        {% csrf_token %}
        
        <div class="mb-3">
            <label class="form-label">{% trans "Имя" %}</label>
            {{ form.name }}
        </div>

        <div class="mb-3">
            <label class="form-label">{% trans "Описание" %}</label>
            {{ form.description }}
        </div>

        <div class="mb-3">
            <label class="form-label">{% trans "Статус" %}</label>
            {{ form.status }}
        </div>

        <div class="mb-3">
            <label class="form-label">{% trans "Исполнитель" %}</label>
            {{ form.executor }}
        </div>

        <div class="d-grid gap-2 d-md-flex justify-content-md-start">
            <button type="submit" class="btn btn-warning me-md-2">{% trans "Изменить" %}</button>
            <a href="{% url 'tasks:tasks' %}" class="btn btn-secondary">{% trans "Отмена" %}</a>
        </div>
    </form>
</div>
{% endblock %}
