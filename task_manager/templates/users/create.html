{% extends 'base.html' %}
{% load i18n %}
{% load bootstrap4 %}

{% block title %}{% trans "Регистрация" %}{% endblock %}

{% block content %}
<div class="container">
  <h1>{% trans "Создать пользователя" %}</h1>
  <form method="post" novalidate>
    {% csrf_token %}
    {% bootstrap_form form %}
    <button type="submit" class="btn btn-primary">{% trans "Зарегистрироваться" %}</button>
  </form>
</div>
{% endblock %}
