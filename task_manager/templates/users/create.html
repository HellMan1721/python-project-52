{% extends 'base.html' %}
{% load i18n %}

{% block title %}{% trans "Регистрация" %}{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2>{% trans "Регистрация" %}</h2>

            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary">{% trans "Зарегистрировать" %}</button>
            </form>

            <p class="mt-3">
                <a href="{% url 'login' %}">{% trans "Вход" %}</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
