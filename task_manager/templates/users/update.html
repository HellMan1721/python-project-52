{% extends 'base.html' %}
{% load i18n %}

{% block title %}{% trans "Изменить пользователя" %}{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2>{% trans "Изменить" %} {{ object.username }}</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-warning">{% trans "Изменить" %}</button>
        <a href="{% url 'users:users' %}" class="btn btn-secondary">{% trans "Отмена" %}</a>
    </form>
</div>
{% endblock %}
